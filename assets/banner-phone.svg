<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chatbot like Claude — mobile">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9f5"/>
      <stop offset="1" stop-color="#f0e7da"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c96442"/>
      <stop offset="1" stop-color="#e08a5f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="24" fill="url(#bg)"/>
  <circle cx="1090" cy="40" r="180" fill="#c96442" opacity="0.07"/>
  <circle cx="980" cy="360" r="120" fill="#c96442" opacity="0.06"/>

  <!-- Left: text -->
  <text x="70" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#c96442">NOW GREAT ON MOBILE</text>

  <text x="68" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#211f1c">Chatbot like Claude</text>
  <rect x="71" y="184" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="70" y="226" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#5c574f">A slide-in drawer with tap-to-close, a composer</text>
  <text x="70" y="256" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#5c574f">that fits any screen, and a Trash with restore.</text>

  <!-- Feature chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5c574f">
    <rect x="70" y="296" width="100" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="120" y="317" text-anchor="middle">Drawer nav</text>
    <rect x="180" y="296" width="120" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="240" y="317" text-anchor="middle">Tap-to-close</text>
    <rect x="310" y="296" width="146" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="383" y="317" text-anchor="middle">Trash + restore</text>
  </g>

  <!-- Phone A: active chat -->
  <g>
    <rect x="744" y="34" width="158" height="312" rx="24" fill="#211f1c"/>
    <rect x="750" y="40" width="146" height="300" rx="18" fill="#f7f6f3"/>
    <!-- header: hamburger + title -->
    <rect x="762" y="53" width="16" height="2.6" rx="1.3" fill="#6b6b66"/>
    <rect x="762" y="58" width="16" height="2.6" rx="1.3" fill="#6b6b66"/>
    <rect x="762" y="63" width="16" height="2.6" rx="1.3" fill="#6b6b66"/>
    <rect x="788" y="53" width="50" height="9" rx="4" fill="#d8d4cb"/>
    <line x1="750" y1="76" x2="896" y2="76" stroke="#e7e4dd" stroke-width="1.5"/>
    <!-- assistant message -->
    <circle cx="767" cy="95" r="9" fill="url(#accent)"/>
    <rect x="782" y="89" width="96" height="7" rx="3.5" fill="#e0ddd6"/>
    <rect x="782" y="101" width="84" height="7" rx="3.5" fill="#e0ddd6"/>
    <rect x="782" y="113" width="70" height="7" rx="3.5" fill="#e0ddd6"/>
    <!-- user bubble -->
    <rect x="792" y="134" width="86" height="26" rx="12" fill="#ece9e3"/>
    <rect x="802" y="144" width="62" height="7" rx="3.5" fill="#d3cfc7"/>
    <!-- assistant + code -->
    <circle cx="767" cy="183" r="9" fill="url(#accent)"/>
    <rect x="782" y="177" width="100" height="7" rx="3.5" fill="#e0ddd6"/>
    <rect x="782" y="189" width="86" height="7" rx="3.5" fill="#e0ddd6"/>
    <rect x="782" y="208" width="96" height="28" rx="6" fill="#211f1c"/>
    <rect x="790" y="215" width="58" height="6" rx="3" fill="#5b8a72"/>
    <rect x="790" y="225" width="44" height="6" rx="3" fill="#9a958c"/>
    <!-- composer -->
    <rect x="760" y="298" width="126" height="32" rx="14" fill="#ffffff" stroke="#ddd9d1"/>
    <rect x="770" y="310" width="52" height="8" rx="4" fill="#cfcbc3"/>
    <circle cx="873" cy="314" r="11" fill="url(#accent)"/>
  </g>
  <text x="823" y="364" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#8a857c">Chat</text>

  <!-- Phone B: drawer open + Trash -->
  <g>
    <rect x="948" y="34" width="158" height="312" rx="24" fill="#211f1c"/>
    <rect x="954" y="40" width="146" height="300" rx="18" fill="#f7f6f3"/>
    <!-- dimmed backdrop -->
    <rect x="954" y="40" width="146" height="300" rx="18" fill="#000000" opacity="0.34"/>
    <!-- drawer -->
    <rect x="954" y="40" width="104" height="300" rx="16" fill="#1a1a18"/>
    <!-- new chat -->
    <rect x="964" y="56" width="84" height="20" rx="10" fill="none" stroke="#4a4843"/>
    <text x="1006" y="70" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="10" fill="#ededed">+ New chat</text>
    <!-- conversation rows -->
    <rect x="960" y="88" width="92" height="20" rx="7" fill="#ffffff1f"/>
    <rect x="966" y="95" width="62" height="7" rx="3.5" fill="#cfcdc7"/>
    <rect x="966" y="120" width="72" height="9" rx="4.5" fill="#2c2b28"/>
    <rect x="966" y="140" width="64" height="9" rx="4.5" fill="#2c2b28"/>
    <rect x="966" y="160" width="76" height="9" rx="4.5" fill="#2c2b28"/>
    <rect x="966" y="180" width="58" height="9" rx="4.5" fill="#2c2b28"/>
    <!-- trash entry -->
    <rect x="964" y="299" width="12" height="2" rx="1" fill="#7a7873"/>
    <rect x="965.5" y="302" width="9" height="9" rx="1.5" fill="none" stroke="#7a7873" stroke-width="1.2"/>
    <rect x="982" y="301" width="38" height="8" rx="4" fill="#3a3935"/>
    <rect x="1028" y="300" width="16" height="11" rx="5.5" fill="#ffffff26"/>
  </g>
  <text x="1027" y="364" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" fill="#8a857c">Drawer + Trash</text>
</svg>
