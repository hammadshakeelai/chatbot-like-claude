<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chatbot like Claude">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9f5"/>
      <stop offset="1" stop-color="#f0e7da"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c96442"/>
      <stop offset="1" stop-color="#e08a5f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="24" fill="url(#bg)"/>
  <circle cx="1090" cy="40" r="180" fill="#c96442" opacity="0.07"/>
  <circle cx="980" cy="360" r="120" fill="#c96442" opacity="0.06"/>

  <!-- Left: text -->
  <text x="70" y="92" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="3" fill="#c96442">OPEN-SOURCE AI CHAT APP</text>

  <text x="68" y="166" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#211f1c">Chatbot like Claude</text>
  <rect x="71" y="184" width="120" height="5" rx="2.5" fill="url(#accent)"/>

  <text x="70" y="226" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#5c574f">A minimal, self-hostable chat app with a Claude-style interface.</text>
  <text x="70" y="256" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="21" fill="#5c574f">Conversation history, streaming replies, your choice of model.</text>

  <!-- Tech chips -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#5c574f">
    <rect x="70" y="296" width="92" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="116" y="317" text-anchor="middle">Node.js</text>
    <rect x="172" y="296" width="84" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="214" y="317" text-anchor="middle">Vercel</text>
    <rect x="266" y="296" width="196" height="32" rx="16" fill="#ffffff" stroke="#e3dccf"/>
    <text x="364" y="317" text-anchor="middle">OpenAI-compatible</text>
  </g>

  <!-- Right: mock UI window -->
  <g>
    <rect x="724" y="74" width="410" height="252" rx="16" fill="#000000" opacity="0.06"/>
    <rect x="720" y="70" width="410" height="252" rx="16" fill="#ffffff"/>

    <!-- window header dots -->
    <circle cx="744" cy="94" r="5" fill="#ff5f57"/>
    <circle cx="762" cy="94" r="5" fill="#febc2e"/>
    <circle cx="780" cy="94" r="5" fill="#28c840"/>
    <line x1="720" y1="116" x2="1130" y2="116" stroke="#efe9df" stroke-width="1.5"/>

    <!-- sidebar -->
    <rect x="732" y="126" width="86" height="184" rx="10" fill="#1c1c1a"/>
    <rect x="741" y="135" width="68" height="22" rx="11" fill="none" stroke="#4a4843"/>
    <text x="775" y="150" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" fill="#ededed">+ New</text>
    <rect x="741" y="168" width="68" height="12" rx="6" fill="#3a3935"/>
    <rect x="741" y="186" width="68" height="12" rx="6" fill="#2c2b28"/>
    <rect x="741" y="204" width="68" height="12" rx="6" fill="#2c2b28"/>

    <!-- chat area: user bubble -->
    <rect x="980" y="134" width="132" height="26" rx="13" fill="#ece9e3"/>

    <!-- assistant message -->
    <rect x="830" y="176" width="22" height="22" rx="5" fill="url(#accent)"/>
    <rect x="862" y="179" width="250" height="9" rx="4.5" fill="#e6e2da"/>
    <rect x="862" y="196" width="232" height="9" rx="4.5" fill="#e6e2da"/>
    <rect x="862" y="213" width="200" height="9" rx="4.5" fill="#e6e2da"/>

    <!-- code block -->
    <rect x="862" y="232" width="250" height="34" rx="6" fill="#211f1c"/>
    <rect x="872" y="241" width="150" height="7" rx="3.5" fill="#5b8a72"/>
    <rect x="872" y="252" width="120" height="7" rx="3.5" fill="#9a958c"/>

    <!-- composer -->
    <rect x="830" y="284" width="258" height="28" rx="14" fill="#ffffff" stroke="#e3dccf"/>
    <circle cx="1102" cy="298" r="12" fill="url(#accent)"/>
  </g>
</svg>
